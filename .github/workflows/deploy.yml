name: Deploy React App

on:
  push:
    branches:
      - main

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm

      - run: pnpm install

      - run: pnpm run build
        env:
          PORT: 3000
          BASE_PATH: /

      # 🚨 THIS IS THE IMPORTANT PART
      - name: Upload build
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./artifacts/yahtzee/dist   # 👈 CHANGE THIS if needed

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Pages
        uses: actions/deploy-pages@v2