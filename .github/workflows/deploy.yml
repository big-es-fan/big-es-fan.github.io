name: Deploy React App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 22

      # 👇 ADD THIS STEP
      - name: Install pnpm
        run: npm install -g pnpm

      # 👇 now this works
      - run: pnpm install
      - run: pnpm run build
        env:
          PORT: 3000
          BASE_PATH: /