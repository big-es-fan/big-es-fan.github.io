kind = "web"
previewPath = "/"
title = "Yahtzee"
version = "1.0.0"
id = "artifacts/yahtzee"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22429

[services.development]
run = "pnpm --filter @workspace/yahtzee run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/yahtzee", "run", "build" ]
publicDir = "artifacts/yahtzee/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22429"
BASE_PATH = "/"
